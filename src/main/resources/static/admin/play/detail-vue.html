<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
<meta charset="utf-8" />
<title>剧目表单 - 汉唐剧院</title>
<link rel="stylesheet" href="../../css/font-awesome.min.css" />
<link rel="stylesheet" href="../../css/theme.css" />
<script src="../../js/theme.js"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<style>
  [v-cloak] { display: none; }
  .form-card { max-width: 700px; }
</style>
</head>
<body>
<div id="app" v-cloak>

  <div class="app-layout">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-logo"><i class="fa fa-film"></i> 汉唐剧院</div>
      <ul class="sidebar-menu">
        <li class="sidebar-label">剧院管理</li>
        <li><a href="../studio/index-vue.html"><i class="fa fa-building"></i> <span>演出厅管理</span></a></li>
        <li><a href="index-vue.html" class="active"><i class="fa fa-video-camera"></i> <span>剧目管理</span></a></li>
        <li><a href="../schedule/index-vue.html"><i class="fa fa-calendar"></i> <span>演出计划</span></a></li>
      </ul>
    </aside>

    <!-- 主内容区 -->
    <div class="main-area">
      <header class="top-header">
        <div class="logo"><i class="fa fa-film"></i> 汉唐剧院管理系统</div>
        <div class="header-right">
          <button id="theme-toggle-btn" class="theme-btn" onclick="toggleTheme()" title="切换主题">☾</button>
          <span style="font-size:13px;opacity:0.85">管理员</span>
        </div>
      </header>

      <div class="content-area">
        <div class="page-title">剧目管理 / {{ typeText }}</div>

        <!-- 表单卡片 -->
        <div class="card form-card">
          <form @submit.prevent="submit">

            <!-- 编号（修改时显示） -->
            <div class="form-group" v-if="type==='update'">
              <label class="form-label">剧目编号</label>
              <input type="text" class="form-input" :value="form.id" disabled>
            </div>

            <!-- 名称 -->
            <div class="form-group">
              <label class="form-label">剧目名称 <span style="color:#c62828">*</span></label>
              <input type="text" class="form-input" v-model="form.name" placeholder="请输入剧目名称">
            </div>

            <!-- 类型ID + 语言ID -->
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">类型</label>
                <select class="form-select" v-model.number="form.typeId">
                  <option :value="null">-- 请选择 --</option>
                  <option :value="5">历史</option>
                  <option :value="6">动画</option>
                  <option :value="7">剧情</option>
                  <option :value="8">恐怖</option>
                  <option :value="9">战争</option>
                  <option :value="10">科幻</option>
                  <option :value="11">爱情</option>
                  <option :value="12">喜剧</option>
                  <option :value="13">动作</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">语言</label>
                <select class="form-select" v-model.number="form.langId">
                  <option :value="null">-- 请选择 --</option>
                  <option :value="14">中文</option>
                  <option :value="15">英语</option>
                  <option :value="16">日语</option>
                  <option :value="17">韩语</option>
                </select>
              </div>
            </div>

            <!-- 时长 + 票价 -->
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">时长（分钟）</label>
                <input type="number" class="form-input" v-model.number="form.length" placeholder="如120" min="1">
              </div>
              <div class="form-group">
                <label class="form-label">票价（元）</label>
                <input type="number" step="0.01" class="form-input" v-model.number="form.ticketPrice" placeholder="如35.00">
              </div>
            </div>

            <!-- 状态 -->
            <div class="form-group">
              <label class="form-label">状态</label>
              <select class="form-select" v-model.number="form.status">
                <option :value="0">已下线</option>
                <option :value="1">已上线</option>
              </select>
            </div>

            <!-- 封面图片上传 -->
            <div class="form-group">
              <label class="form-label">封面图片</label>
              <!-- 图片预览 -->
              <div v-if="form.image" style="margin-bottom:12px">
                <img :src="form.image" style="max-width:280px;max-height:200px;border-radius:8px;border:2px solid var(--border-color);display:block" />
              </div>
              <!-- 已上传图片URL（只读显示） -->
              <div v-if="form.image" style="margin-bottom:10px;display:flex;align-items:center;gap:8px">
                <input type="text" class="form-input" :value="form.image" readonly style="font-size:12px;background:var(--bg-badge)" />
                <button type="button" class="btn btn-outline btn-sm" @click="clearImage" title="清除图片">
                  <i class="fa fa-times"></i>
                </button>
              </div>
              <!-- 选择文件 + 上传按钮 -->
              <div style="display:flex;gap:8px;align-items:center">
                <input type="file" ref="fileInput" accept="image/*" @change="onFileSelected" style="font-size:13px" />
                <button type="button" class="btn btn-primary btn-sm" @click="uploadImage" :disabled="!selectedFile || uploading">
                  <i class="fa fa-cloud-upload"></i> {{ uploading ? '上传中...' : '上传' }}
                </button>
              </div>
              <div style="font-size:12px;color:var(--text-muted);margin-top:6px">
                支持 JPG/PNG/GIF，单张不超过 10MB。也可手动填入已有的图片URL。
              </div>
            </div>

            <!-- 简介 -->
            <div class="form-group">
              <label class="form-label">简介</label>
              <textarea class="form-input" v-model="form.introduction" rows="4" placeholder="请输入剧目简介"></textarea>
            </div>

            <!-- 按钮 -->
            <div class="mt-16" style="display:flex;gap:12px">
              <button type="submit" class="btn btn-primary"><i class="fa fa-check"></i> 提交</button>
              <button type="button" class="btn btn-outline" onclick="window.location='index-vue.html'">
                <i class="fa fa-arrow-left"></i> 返回
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const { createApp } = Vue

// 从URL参数中取值
function getParam(name) {
  var m = new RegExp('[?&]' + name + '=([^&]*)').exec(window.location.search)
  return m ? decodeURIComponent(m[1]) : null
}

createApp({
  data() {
    return {
      type: 'add',           // add 或 update
      selectedFile: null,    // 用户选中的文件对象
      uploading: false,      // 是否正在上传中
      form: {
        id: null, name: '', typeId: null, langId: null,
        length: null, ticketPrice: null, status: 0,
        image: '', introduction: ''
      }
    }
  },
  computed: {
    typeText() { return this.type === 'add' ? '新增剧目' : '修改剧目' }
  },
  mounted() {
    // 读取URL参数
    this.type = getParam('type') || 'add'
    if (this.type === 'update') {
      this.form.id = parseInt(getParam('id'))
      this.form.name = getParam('name') || ''
      this.form.typeId = parseInt(getParam('typeId')) || null
      this.form.langId = parseInt(getParam('langId')) || null
      this.form.length = parseInt(getParam('length')) || null
      this.form.ticketPrice = parseFloat(getParam('ticketPrice')) || null
      this.form.status = parseInt(getParam('status')) || 0
      this.form.image = getParam('image') || ''
      this.form.introduction = getParam('introduction') || ''
    }
    // 初始化主题图标
    updateIcon(document.documentElement.getAttribute('data-theme'))
  },
  methods: {
    // 用户选择文件后触发
    onFileSelected(e) {
      this.selectedFile = e.target.files[0] || null
    },
    // 上传图片到服务器
    uploadImage() {
      if (!this.selectedFile) return
      // 构造 FormData 用于文件上传
      var fd = new FormData()
      fd.append('file', this.selectedFile)
      this.uploading = true
      axios.post('/api/upload/image', fd, {
        headers: { 'Content-Type': 'multipart/form-data' }
      }).then(res => {
        if (res.data.code === 200) {
          this.form.image = res.data.data  // 自动填入返回的图片URL
          this.selectedFile = null
          this.$refs.fileInput.value = ''  // 清空文件选择框
        }
        alert(res.data.msg)
      }).finally(() => {
        this.uploading = false
      })
    },
    // 清除已上传的图片
    clearImage() {
      if (confirm('确定清除当前图片？')) {
        this.form.image = ''
        this.selectedFile = null
        this.$refs.fileInput.value = ''
      }
    },
    // 提交表单：新增用POST，修改用PUT
    submit() {
      if (!this.form.name || !this.form.name.trim()) return alert('请输入剧目名称')

      if (this.type === 'add') {
        axios.post('/api/play', this.form).then(res => {
          alert(res.data.msg)
          if (res.data.code === 200) window.location = 'index-vue.html'
        })
      } else {
        axios.put('/api/play', this.form).then(res => {
          alert(res.data.msg)
          if (res.data.code === 200) window.location = 'index-vue.html'
        })
      }
    }
  }
}).mount('#app')
</script>
</body>
</html>
